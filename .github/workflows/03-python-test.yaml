name: 03 Python Test Workflow

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - '!main'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip 업그레이드
        run: python -m pip install --upgrade pip

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 테스트 실행
        run: pytest